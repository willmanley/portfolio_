<!-- An HTML template, defining the structure of the Certifications page. -->

<!DOCTYPE html>

<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Portfolio - Certifications</title>
  <!-- Links to CSS styling consumed by the Certifications page. -->
  <link rel="stylesheet" href="../styles/global.css">
  <link rel="stylesheet" href="../styles/certifications.css">
</head>

<body>
<!-- Global content (header) will be injected at the top -->
<div id="global-header"></div>

<!-- Local page content goes here. -->
<main id="main-content">
  <h2>My Professional Certifications</h2>

  <hr class="section-divider">

  <section class="cert-section" id="aws-certs">
    <h3>AWS Certifications</h3>
    <div class="badge-container">
      <div class="badge">
        <div class="badge-img">
          <img src="../assets/images/aws_cloud_practioner.png" alt="AWS Cloud Practitioner">
        </div>
        <figcaption class="badge-caption">AWS Cloud Practitioner Foundational</figcaption>
      </div>
  </section>

  <hr class="section-divider">

  <section class="cert-section" id="terraform-certs">
    <h3>Terraform Certifications</h3>
    <div class="badge-container">
      <div class="badge">
        <div class="badge-img">
          <img src="../assets/images/terraform_associate.png" alt="Terraform Associate">
        </div>
        <figcaption class="badge-caption">Terraform Associate</figcaption>
      </div>
    </div>
  </section>

  <hr class="section-divider">

  <section class="cert-section" id="docker-certs">
    <h3>Docker Certifications</h3>
    <div class="badge-container">
      <!-- Docker certification badges will go here -->
      <p>Docker certification badges coming soon</p>
    </div>
  </section>

  <hr class="section-divider">

  <section class="cert-section" id="kubernetes-certs">
    <h3>Kubernetes Certifications</h3>
    <div class="badge-container">
      <!-- Kubernetes certification badges will go here -->
      <p>Kubernetes certification badges coming soon</p>
    </div>
  </section>

  <hr class="section-divider">

  <section class="cert-section" id="tensorflow-certs">
    <h3>TensorFlow Certifications</h3>
    <div class="badge-container">
      <!-- TensorFlow certification badges will go here -->
      <div class="badge">
        <div class="badge-img">
          <img src="../assets/images/tensorflow_developer.png" alt="TensorFlow Developer">
        </div>
        <figcaption class="badge-caption">TensorFlow Developer</figcaption>
      </div>
    </div>
  </section>

</main>

<!-- Global content (footer) will be injected at the bottom -->
<div id="global-footer"></div>

<!-- Links to JS scripts consumed by the Certifications page. -->
<script src="../scripts/global.js"></script>
</body>

</html>
