<!-- An HTML template, defining the structure of the Index (Home) page. -->

<!DOCTYPE html>

<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Portfolio</title>
    <!-- Links to CSS styling consumed by the Index (Home) page. -->
    <link rel="stylesheet" href="../styles/global.css">
</head>

<body>
<!-- Global content (header) will be injected at the top -->
<div id="global-header"></div>

<!-- Local page content goes here. -->
<main id="main-content">
    <h2>Welcome to My Portfolio</h2>
    <p>This is a work in progress.</p>
</main>

<!-- Global content (footer) will be injected at the bottom -->
<div id="global-footer"></div>

<!-- Links to JS scripts consumed by the Index (Home) page. -->
<script src="../scripts/global.js"></script>
</body>

</html>
